<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="CRO Case Study — VERDANT · High-Converting DTC Store Concept">
<meta property="og:image" content="https://jonathansettele.github.io/verdant-cro-case-study/thumb.png">

<title>CRO Case Study — VERDANT · High-Converting DTC Store Concept</title>

<style>
:root {
  --bg: #0a0f0a;
  --bg2: #111811;
  --bg3: #1a221a;
  --border: #2a3a2a;
  --green: #4ade80;
  --green2: #16a34a;
  --accent: #86efac;
  --muted: #6b7f6b;
  --text: #e8f5e8;
  --dim: #9ab89a;
  --red: #f87171;
  --orange: #fb923c;
  --r: 12px;
  --sans: -apple-system,'Segoe UI',sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.6}

/* ───────────────── NAV ───────────────── */
nav{position:sticky;top:0;z-index:50;background:rgba(10,15,10,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px}
.nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:16px;flex-wrap:wrap}
.nav-logo{font-weight:800;font-size:1rem;color:var(--accent)}

/* ───────────────── HERO ───────────────── */
.hero{max-width:900px;margin:0 auto;padding:72px 24px;text-align:center}

/* ───────────────── INSIGHTS ───────────────── */
.insight-marker{position:absolute;z-index:10;display:none}
.insights-active .insight-marker{display:flex}

.insight-num{
  width:22px;height:22px;
  background:var(--green2);
  color:#fff;
  border-radius:50%;
  font-size:.7rem;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.insight-popup{
  display:none;
  position:fixed;
  z-index:200;
  background:var(--bg2);
  border:1px solid var(--green2);
  border-radius:12px;
  padding:14px 16px;
  max-width:320px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}

.insight-popup.show{display:block}

/* ───────────────── MOCK STORE ───────────────── */
.mock-section{background:var(--bg2);border:1px solid var(--border);padding:20px}

.insight-panel{position:relative}

</style>
</head>

<body>

<!-- INSIGHT POPUP -->
<div class="insight-popup" id="insight-popup">
  <div id="insight-title" style="font-weight:700;color:var(--green);margin-bottom:6px"></div>
  <div id="insight-body" style="color:var(--dim);font-size:.85rem;line-height:1.5"></div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>CRO Case Study</h1>
</div>

<!-- MOCK STORE -->
<div id="store-mock">

  <div class="mock-section insight-panel">
    <h2>Hero Section</h2>
  </div>

  <div class="mock-section insight-panel">
    <h2>Product Section</h2>
  </div>

  <div class="mock-section insight-panel">
    <h2>CTA Section</h2>
  </div>

</div>

<script>

/* ───────────────── DATA ───────────────── */

var LANG = 'EN';

var insights = {
  EN: [
    {title:'Trust above the fold', body:'Users decide in 3 seconds whether to stay.'},
    {title:'Outcome headline', body:'People buy outcomes, not products.'},
    {title:'CTA psychology', body:'Make the action feel like a benefit.'}
  ]
};

/* ───────────────── FIXED INSIGHTS SYSTEM ───────────────── */

var insightsOn = false;

function toggleInsights() {
  insightsOn = !insightsOn;

  var mock = document.getElementById('store-mock');

  if (insightsOn) {
    mock.classList.add('insights-active');
    renderInsightMarkers();
  } else {
    mock.classList.remove('insights-active');
    clearMarkers();
    closeInsight();
  }
}

function clearMarkers() {
  document.querySelectorAll('.insight-marker').forEach(el => el.remove());
}

function renderInsightMarkers() {
  clearMarkers();

  if (!insightsOn) return;

  var panels = document.querySelectorAll('.insight-panel');

  panels.forEach((panel, index) => {
    var marker = document.createElement('div');
    marker.className = 'insight-marker';
    marker.style.top = '10px';
    marker.style.right = '10px';

    marker.innerHTML = `<div class="insight-num">${index + 1}</div>`;

    marker.addEventListener('click', function (e) {
      e.stopPropagation();
      showInsight(index, panel);
    });

    panel.appendChild(marker);
  });
}

function showInsight(index, panel) {
  var data = insights[LANG][index];
  if (!data) return;

  var popup = document.getElementById('insight-popup');

  document.getElementById('insight-title').textContent = data.title;
  document.getElementById('insight-body').textContent = data.body;

  var rect = panel.getBoundingClientRect();

  popup.style.top = (rect.top + window.scrollY + 40) + 'px';
  popup.style.left = Math.min(rect.left + 20, window.innerWidth - 340) + 'px';

  popup.classList.add('show');
}

function closeInsight() {
  document.getElementById('insight-popup').classList.remove('show');
}

document.addEventListener('click', function(e){
  if(!e.target.closest('.insight-popup') && !e.target.closest('.insight-num')){
    closeInsight();
  }
});

/* ───────────────── AUTO INIT (TEST) ───────────────── */
// optional: enable insights automatically for testing
// toggleInsights();

</script>

</body>
</html>
